version: '3.8'

services:
  profile-site:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vibe-profile-site
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
    networks:
      - homelab-net

networks:
  homelab-net:
    external: true
    name: homelab_homelab-net
