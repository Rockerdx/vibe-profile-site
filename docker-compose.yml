services:
  postgres:
    image: postgres:15-alpine
    container_name: vibe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: profile_user
      POSTGRES_PASSWORD: profile_pass
      POSTGRES_DB: profile_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - homelab-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U profile_user -d profile_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../vibe-profile-backend
      dockerfile: Dockerfile
    container_name: vibe-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - homelab-net

  profile-site:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_OPTIONS=--max-old-space-size=2048
    container_name: vibe-profile-site
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=2048
      - NEXT_PUBLIC_API_URL=http://backend:8080
    depends_on:
      - backend
    networks:
      - homelab-net

networks:
  homelab-net:
    external: true
    name: homelab_homelab-net

volumes:
  postgres_data:
